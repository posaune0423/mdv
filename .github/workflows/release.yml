name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/mdv"
          test -x "$bin"
          asset="mdv-${{ matrix.target }}.tar.gz"
          tar czf "$asset" -C "target/${{ matrix.target }}/release" mdv
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" >> SHA256SUMS.part
          else
            shasum -a 256 "$asset" >> SHA256SUMS.part
          fi

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: |
            mdv-${{ matrix.target }}.tar.gz
            SHA256SUMS.part

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: package-*
          merge-multiple: true

      - name: Merge checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          find artifacts -name 'SHA256SUMS.part' -exec cat {} \; > dist/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
