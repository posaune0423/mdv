name: Package Artifacts

on:
  workflow_call:
    inputs:
      artifact-prefix:
        description: Prefix used for uploaded artifact names and cache keys.
        required: true
        type: string
      checkout-ref:
        description: Git ref to package.
        required: true
        type: string

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.artifact-prefix }}-${{ matrix.target }}

      - name: Package archive
        run: ./scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Verify packaged archive
        run: ./scripts/verify-release-archive.sh "dist/mdv-${{ matrix.target }}.tar.gz" dist/SHA256SUMS.part

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.target }}
          path: dist/*
