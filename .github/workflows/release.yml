name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build release assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    permissions:
      contents: read
    uses: ./.github/workflows/package-artifacts.yml
    with:
      artifact-prefix: release
      checkout-ref: ${{ needs.release-please.outputs.tag_name }}

  publish:
    name: Publish release assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Merge checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          find artifacts -name 'SHA256SUMS.part' -exec cat {} \; | sort > dist/SHA256SUMS

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber
